language: ko-KR

reviews:
  profile: 'chill' # 부드러운 톤 유지

  high_level_summary: true  # PR 상단에 요약 제공

  request_changes_workflow: true
  
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - .*

  path_instructions: 
    - path: "**/*.{ts,tsx}"
      instructions: |
        1. BFF 및 보안
          - 모든 API 호출은 src/app/api BFF Route를 거쳐야 함
          - 클라이언트에서 외부 백엔드 직접 fetch 금지
          - AppCheck proxyRequest 확인

        2. UI/UX Mobile-First
          - 터치 영역 최소 44px 확인
          - width 또는 height 중 하나만 44px 이상이면 허용
          - 단, 나머지 축이 지나치게 작아 실제 터치가 어려운 경우에만 예외적으로 지적


        3. 코드 일관성
          - HTTP 상태 코드 사용 및 영문 컨벤션 체크

        4. Next.js 규칙
          - 불필요한 "use client" 사용 여부 확인
          - fetch cache 전략 확인

chat:
  auto_reply: true