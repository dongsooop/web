name: Deploy to EC2

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Create firebase.ts
        run: |
          mkdir -p src/lib
          cat > src/lib/firebase.ts <<'EOF'
          ${{ secrets.FIREBASE_TS }}
          EOF

      - name: Create request.json
        run: |
          mkdir -p src/utils
          cat > src/utils/request.json <<'EOF'
          ${{ secrets.REQUEST_JSON }}
          EOF

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/dongsoop-web:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/dongsoop-web:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/dongsoop-web:buildcache,mode=max

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add known hosts
        run: ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} -p ${{ secrets.PORT }} "
            cd ~/dongsoop &&
            echo '${{ secrets.GHCR_TOKEN }}' | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin &&
            docker pull ghcr.io/${{ github.repository_owner }}/dongsoop-web:latest &&
            docker compose -f web-docker-compose.yml up -d &&
            docker system prune -af
          "